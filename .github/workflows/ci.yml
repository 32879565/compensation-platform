name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  backend:
    name: Backend checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: |
            backend/requirements-build.lock
            backend/requirements-dev.lock
      - name: Install backend dependencies
        run: |
          python -m pip install --require-hashes -r requirements-build.lock
          python -m pip install --require-hashes -r requirements-dev.lock
          python -m pip install --no-deps --no-build-isolation .
      - name: Ruff
        run: ruff check .
      - name: Black
        run: black --check .
      - name: Mypy
        run: mypy app
      - name: Pytest
        run: pytest
      - name: Core payroll coverage
        run: |
          pytest -o addopts='' --cov=app.payroll.engine --cov-fail-under=95 tests/test_payroll_engine.py
          pytest -o addopts='' --cov=app.payroll.social_tax --cov-fail-under=95 tests/test_social_tax.py
      - name: Bandit
        run: bandit -r app
      - name: Pip audit
        run: pip-audit --strict -r requirements-dev.lock

  frontend:
    name: Frontend checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend dependencies
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Typecheck
        run: npm run typecheck
      - name: Test
        run: npm test -- --run
      - name: Build
        run: npm run build
      - name: NPM audit
        run: npm audit --audit-level=high --registry=https://registry.npmjs.org

  docker:
    name: Docker builds and E2E
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    env:
      POSTGRES_PASSWORD: ci-validation-only-postgres-password
      COMP_SECRET_KEY: ci-validation-only-secret-key-not-a-production-secret
      COMP_ENCRYPTION_KEY: ci-validation-only-encryption-key-not-a-production-secret
      COMP_COOKIE_SECURE: "false"
      COMP_PUBLIC_HOST: example.test
      COMP_ACME_EMAIL: ops@example.test
      E2E_ALLOW_WRITES: "true"
      E2E_USERNAME: e2e-admin
      E2E_REVIEWER_USERNAME: e2e-reviewer
    steps:
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
      - name: Validate deployment configuration
        env:
          COMP_COOKIE_SECURE: "true"
        run: docker compose -f deploy/docker-compose.yml --profile production config --quiet
      - name: Validate Caddyfile
        run: >-
          docker run --rm -e COMP_PUBLIC_HOST -e COMP_ACME_EMAIL
          -v "$GITHUB_WORKSPACE/deploy/Caddyfile:/etc/caddy/Caddyfile:ro"
          caddy:2.8-alpine@sha256:af32e97399febea808609119bb21544d0265c58a02836576e32a2d082c262c17
          caddy validate --config /etc/caddy/Caddyfile --adapter caddyfile
      - name: Build backend image
        run: docker build --tag compensation-backend:ci backend
      - name: Build frontend image
        run: docker build --tag compensation-frontend:ci frontend
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install E2E dependencies
        working-directory: frontend
        run: npm ci
      - name: Install Chromium
        working-directory: frontend
        run: npx playwright install --with-deps chromium
      - name: Generate disposable E2E target marker
        shell: bash
        run: |
          e2e_marker="$(openssl rand -hex 32)"
          printf 'COMP_E2E_TARGET_MARKER=%s\n' "$e2e_marker" >> "$GITHUB_ENV"
          printf 'E2E_TARGET_MARKER=%s\n' "$e2e_marker" >> "$GITHUB_ENV"
      - name: Start isolated E2E stack
        run: docker compose --project-name compensation-e2e -f deploy/docker-compose.yml up -d --build --wait --wait-timeout 180
      - name: Generate disposable E2E credentials
        shell: bash
        run: |
          e2e_password="$(openssl rand -hex 32)"
          e2e_reviewer_password="$(openssl rand -hex 32)"
          echo "::add-mask::$e2e_password"
          echo "::add-mask::$e2e_reviewer_password"
          printf 'E2E_PASSWORD=%s\n' "$e2e_password" >> "$GITHUB_ENV"
          printf 'E2E_REVIEWER_PASSWORD=%s\n' "$e2e_reviewer_password" >> "$GITHUB_ENV"
      - name: Bootstrap E2E administrator
        run: >-
          COMP_BOOTSTRAP_PASSWORD="$E2E_PASSWORD"
          docker compose --project-name compensation-e2e -f deploy/docker-compose.yml exec -T
          -e COMP_BOOTSTRAP_PASSWORD backend python -m app.auth.bootstrap --username e2e-admin
      - name: Seed disposable payroll E2E scenario
        run: >-
          docker compose --project-name compensation-e2e -f deploy/docker-compose.yml exec -T
          -e E2E_ALLOW_WRITES -e E2E_USERNAME -e E2E_REVIEWER_USERNAME
          -e E2E_REVIEWER_PASSWORD backend python -m app.e2e.bootstrap
      - name: Run guarded browser lifecycle suite
        working-directory: frontend
        env:
          PLAYWRIGHT_BASE_URL: http://127.0.0.1:8080
          E2E_ALLOW_WRITES: "true"
        run: npm run test:e2e
      - name: Print E2E service logs on failure
        if: failure()
        run: docker compose --project-name compensation-e2e -f deploy/docker-compose.yml logs --no-color
      - name: Stop isolated E2E stack
        if: always()
        run: docker compose --project-name compensation-e2e -f deploy/docker-compose.yml down --volumes --remove-orphans
