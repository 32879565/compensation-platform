server {
    listen 80;

    # Only the production Caddy gateway may assert an external client IP. A
    # direct request to the loopback frontend port keeps its Docker peer IP and
    # cannot inject an arbitrary X-Forwarded-For value into the backend audit
    # or login-throttle key.
    set_real_ip_from 172.30.0.11;
    real_ip_header X-Forwarded-For;
    real_ip_recursive off;

    server_tokens off;
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header Referrer-Policy no-referrer always;
    # The SPA needs inline styles because Ant Design injects them at runtime;
    # every executable script remains same-origin. HSTS belongs exclusively to
    # the TLS gateway below, since this container also serves plain HTTP on
    # an internal network.
    add_header Content-Security-Policy "default-src 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'none'; form-action 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self' data:; connect-src 'self'" always;

    location /api/ {
        # The trusted gateway terminates TLS and overwrites this value. Direct
        # frontend traffic is always forwarded as its actual (HTTP) scheme.
        set $forwarded_proto $scheme;
        if ($realip_remote_addr = 172.30.0.11) {
            set $forwarded_proto $http_x_forwarded_proto;
        }
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        # Replace rather than append client-supplied forwarding data. Uvicorn
        # accepts this header only from the fixed frontend container IP.
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $forwarded_proto;
    }

    location / {
        root /usr/share/nginx/html;
        try_files $uri /index.html;
    }
}
